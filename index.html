<!DOCTYPE html>
<html>
<head>
<title>Valentine</title>

<style>

body{
background:#ffc0cb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
}

.box{
background:white;
padding:40px;
border-radius:20px;
text-align:center;
}

button{
padding:12px 30px;
font-size:18px;
border:none;
border-radius:25px;
margin:10px;
cursor:pointer;
}

#yes{
background:#ff2d7a;
color:white;
}

#no{
background:#ddd;
}

</style>

</head>

<body>

<div class="box">

<h2 id="text">Paathu, will you be my Valentine?</h2>

<button id="yes">Yes</button>
<button id="no">No</button>

</div>

<script>

let no=document.getElementById("no");

no.addEventListener("mouseover",function(){

let x=Math.random()*300;
let y=Math.random()*300;

no.style.position="absolute";
no.style.left=x+"px";
no.style.top=y+"px";

});

document.getElementById("yes").onclick=function(){
document.getElementById("text").innerHTML="Yay! ❤️";
}

</script>

</body>
</html>
