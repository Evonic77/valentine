<!DOCTYPE html>
<html>
<head>
<title>Valentine</title>
<style>
body{
  background:#ffc0cb;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
  overflow:hidden;
}

.box{
  background:white;
  padding:40px;
  border-radius:20px;
  text-align:center;
  position:relative;
  width:400px;
  height:300px;
}

/* Cute cat */
.cat-img{
  width:100px;
  margin-bottom:15px;
  transition: transform 0.3s;
}

/* Floating hearts */
.heart {
  position:absolute;
  font-size:30px;
  color:red;
  animation: floatUp 1.5s ease-out forwards;
}

@keyframes floatUp {
  0% { transform: translateY(0) scale(1); opacity:1; }
  50% { transform: translateY(-80px) scale(1.5); opacity:0.7; }
  100% { transform: translateY(-150px) scale(0); opacity:0; }
}

button{
  padding:12px 30px;
  font-size:18px;
  border:none;
  border-radius:25px;
  margin:10px;
  cursor:pointer;
}

#yes{
  background:#ff2d7a;
  color:white;
  position:relative;
}

#no{
  background:#ddd;
  position:absolute;
  /* Initially right next to Yes */
  left:calc(50% + 50px); 
  top:180px;
  transition: left 0.2s, top 0.2s;
}

#text{
  margin-bottom:20px;
  font-size:18px;
}
</style>
</head>
<body>

<div class="box" id="box">
  <!-- Cute cat -->
 <img id="cat" src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png" width="80">
  
  <h2 id="text">শশী, তুমি কি তোমার বাপের সব সম্পত্তি তোমার আদরের জামাইকে গিফট দেওয়ার ব্যবস্থা করবা?😍</h2>
  
  <button id="yes">Yes</button>
  <button id="no">No</button>
</div>

<script>
let no = document.getElementById("no");
let yes = document.getElementById("yes");
let text = document.getElementById("text");
let cat = document.getElementById("cat");
let box = document.getElementById("box");

// Capture Yes button position
function placeNoNextToYes(){
  let rect = yes.getBoundingClientRect();
  let boxRect = box.getBoundingClientRect();
  
  // relative to box
  no.style.left = (rect.right - boxRect.left + 10) + "px"; // 10px gap
  no.style.top = (rect.top - boxRect.top) + "px";
}

// Place No initially next to Yes
placeNoNextToYes();

// No button moves only inside the box on hover/touch
no.addEventListener("mouseover", moveNo);
no.addEventListener("touchstart", moveNo);

function moveNo(){
  let maxX = box.clientWidth - no.offsetWidth - 10; 
  let maxY = box.clientHeight - no.offsetHeight - 10;
  
  let x = Math.random() * maxX;
  let y = Math.random() * maxY;
  
  no.style.left = x + "px";
  no.style.top = y + "px";
}

// Yes button click → hearts + cat reaction + hide No
yes.addEventListener("click", function(){
  text.innerHTML = "Thank u sona😘[Evon+Shoshe]❤️";

  // Hide No button
  no.style.display = "none";
  
  // Floating hearts
  for(let i=0; i<5; i++){
    let heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    
    let rect = yes.getBoundingClientRect();
    heart.style.left = rect.left + (Math.random()*yes.offsetWidth) + "px";
    heart.style.top = rect.top + "px";
    
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 1500);
  }
  
  cat.style.transform = "scale(1.2)";
  setTimeout(()=> cat.style.transform = "scale(1)", 300);
});
</script>

</body>
</html>
